name: Validate Skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile scripts
        run: python -m py_compile skills/shopify-seo-blog-writer/scripts/validate_bundle.py skills/shopify-seo-blog-writer/scripts/build_docx.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
